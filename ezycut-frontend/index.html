<!doctype html>
<html lang="en">
  <head>
    <script>window.__loaderStart = Date.now();</script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/ezycutLogo-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EZYCUT — Smart Salon Booking & Queue Management</title>
    <meta name="description" content="Book salon appointments online, track your queue in real time, and manage your grooming experience with EzyCut — India's smart salon platform." />
    <meta name="keywords" content="salon booking, haircut appointment, queue tracking, barbershop, beauty salon India" />
    <meta property="og:title" content="EzyCut — Smart Salon Booking" />
    <meta property="og:description" content="Book salon appointments, skip queues, and track your experience in real time." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
  #app-loader {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    background: #ffffff;
    transition: opacity 0.4s ease, visibility 0.4s ease;
  }

  #app-loader.hide {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  #app-loader .brand-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #app-loader img {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    animation: pulseLogo 1.6s ease-in-out infinite;
  }

  #app-loader .brand-name {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #0f172a;
  }

  #app-loader .brand-name span {
    color: #0d9488;
  }

  #app-loader .loader-bar-track {
    width: 220px;
    height: 4px;
    border-radius: 999px;
    background: #e2e8f0;
    overflow: hidden;
  }

  #app-loader .loader-bar-fill {
    height: 100%;
    width: 40%;
    border-radius: 999px;
    background: linear-gradient(90deg, #0d9488, #14b8a6);
    animation: loaderSlide 1.1s ease-in-out infinite;
  }

  @keyframes pulseLogo {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.06); opacity: 0.85; }
  }

  @keyframes loaderSlide {
    0% { transform: translateX(-100%); }
    50% { transform: translateX(120%); }
    100% { transform: translateX(-100%); }
  }
</style>
  </head>
  <body>
   <!-- ── Initial Splash Loader ── -->
<div id="app-loader">
  <div class="brand-row">
    <img src="/ezycutLogo-icon.png" alt="EzyCut logo" />
    <div class="brand-name">EZY<span>CUT</span></div>
  </div>
  <div class="loader-bar-track">
    <div class="loader-bar-fill"></div>
  </div>
</div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
